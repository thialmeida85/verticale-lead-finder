services:
  - type: web
    name: verticale-lead-finder-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: cd backend && pip install -r requirements.txt && alembic upgrade head
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CNPJ_API_KEY
        sync: false
      - key: CNPJ_API_BASE_URL
        value: https://publica.cnpj.ws/cnpj
      - key: CORS_ORIGINS
        sync: false
      - key: EXPORTS_DIR
        value: ../exports

  - type: web
    name: verticale-lead-finder-web
    runtime: static
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
